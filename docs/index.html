<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Portfolio</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <header class="header">
    <h1 id="site-title">MyPortfolio</h1>

    <div class="search-box">
      <i class="fa-solid fa-magnifying-glass search-icon"></i>
      <input id="search-input" type="text" placeholder="検索…" />
      <span id="search-clear" class="search-clear">×</span>
    </div>

    <div class="mobile-menu-btn">
      <span></span><span></span><span></span>
    </div>
  </header>

  <div class="mobile-menu-panel">
    <a class="nav-item" data-view="gallery">画像一覧</a>
    <a class="nav-item" data-view="about">ABOUT</a>
    <a class="nav-item" data-view="info">制作について</a>
    <a class="nav-item" href="https://himawari-fukushikai.org/" target="_blank">法人HP</a>
    <button class="consult-btn">ご相談はこちら</button>
    <div class="search-box mobile-search"></div>
  </div>

  <div class="layout">

    <aside id="sidebar" class="sidebar">
      <a class="nav-item" data-view="gallery">画像一覧</a>
      <a class="nav-item" data-view="about">ABOUT</a>
      <a class="nav-item" data-view="info">制作について</a>
      <a class="nav-item" href="https://himawari-fukushikai.org/" target="_blank">法人HP</a>

      <div class="sidebar-bottom">
        <button class="consult-btn">ご相談はこちら</button>
      </div>

      <div id="admin-panel" class="admin-only">管理者モード中</div>
    </aside>

    <main class="main">

      <div id="dropzone" class="dropzone">
        ここに画像をドラッグ＆ドロップ
      </div>

      <div id="view-gallery" class="view">
        <div id="works-list" class="works-grid"></div>
      </div>

      <div id="view-about" class="view hidden">
        <div class="section-header">
          <h2>ABOUT</h2>
          <button id="edit-about" class="edit-button admin-only">編集</button>
        </div>
        <div id="about-content" class="editable-block"></div>
      </div>

      <div id="view-info" class="view hidden">
        <div class="section-header">
          <h2>制作について</h2>
          <button id="edit-info" class="edit-button admin-only">編集</button>
        </div>
        <div id="info-content" class="editable-block"></div>
      </div>

      <!-- ★ viewer を dropzone の下に固定配置 -->
      <div id="image-viewer" class="image-viewer">
        <div class="viewer-left">
          <img id="viewer-image" class="viewer-image" src="" alt="" />
        </div>

        <div class="viewer-right">
          <h4 class="viewer-section-title">TITLE</h4>
          <h3 id="viewer-title" class="viewer-title"></h3>

          <h4 class="viewer-section-title">TAGS</h4>
          <div id="viewer-tags" class="viewer-tags"></div>

          <h4 class="viewer-section-title">DESCRIPTION</h4>
          <p id="viewer-description" class="viewer-description"></p>
        </div>
      </div>

    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>

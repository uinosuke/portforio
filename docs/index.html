<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Myportfolio</title>

  <!-- ★ CSS（GitHub Pages で確実に読み込まれるパス） -->
  <link rel="stylesheet" href="./style.css">

  <!-- ★ FontAwesome（虫眼鏡アイコン復活） -->
<link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  crossorigin="anonymous"
/>

</head>
<body>

  <!-- ヘッダー -->
  <header class="header">
    <button id="site-title" class="title-button">Myportfolio</button>
    
    <!-- 🔍 検索バー -->
    <div class="search-box">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input id="search-input" type="text" placeholder="検索（タイトル・タグ）">
    </div>
  </header>

  <!-- レイアウト -->
  <main class="layout">

    <!-- サイドバー -->
    <aside class="sidebar">
      <nav>
        <button class="nav-button" data-view="gallery">WORKS</button>
        <button class="nav-button" data-view="about">ABOUT</button>
        <button class="nav-button" data-view="info">制作について</button>
      </nav>

      <!-- ご相談はコチラ（復活） -->
      <div class="sidebar-bottom">
        <button class="consult-btn">ご相談はコチラ</button>
      </div>

      <!-- 管理者モード表示 -->
      <div id="admin-panel" class="admin-only">
        <h2>管理者モード</h2>
        <p>画像を右側のエリアにドラッグ＆ドロップするとアップロードできます。</p>
      </div>
    </aside>

    <!-- メイン領域 -->
    <section class="main">

      <!-- ドロップゾーン -->
      <div id="dropzone" class="dropzone admin-only">
        ここに画像をドラッグ＆ドロップするとアップロードされます
      </div>

      <!-- WORKS -->
      <section id="view-gallery" class="view">
        <div id="works-list" class="works-grid"></div>
      </section>

      <!-- ABOUT -->
      <section id="view-about" class="view hidden">
        <div class="section-header">
          <h2>ABOUT</h2>
          <button id="edit-about" class="admin-only edit-button">✏ 編集</button>
        </div>
        <div id="about-content" class="editable-block"></div>
      </section>

      <!-- 制作について -->
      <section id="view-info" class="view hidden">
        <div class="section-header">
          <h2>制作について</h2>
          <button id="edit-info" class="admin-only edit-button">✏ 編集</button>
        </div>
        <div id="info-content" class="editable-block"></div>
      </section>

    </section>
  </main>

  <!-- JS（GitHub Pages で確実に読み込まれるパス） -->
  <script src="./app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Portfolio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===============================
       ヘッダー
  =============================== -->
  <header class="header">
    <h1 id="site-title">MyPortfolio</h1>

    <div class="search-box">
      <span class="magnifying_glass">🔍</span>
      <input id="search-input" type="text" placeholder="検索…" />
    </div>
  </header>

  <!-- ===============================
       レイアウト（サイドバー＋メイン）
  =============================== -->
  <div class="layout">

    <!-- ===============================
         左サイドバー
    =============================== -->
    <aside id="sidebar" class="sidebar">
      <button class="nav-button" data-view="gallery">画像一覧</button>
      <button class="nav-button" data-view="about">ABOUT</button>
      <button class="nav-button" data-view="info">制作について</button>

      <div class="sidebar-bottom">
        <button class="consult-btn">ご相談はこちら</button>
      </div>

      <div id="admin-panel" class="admin-only">
        管理者モード中
      </div>
    </aside>

    <!-- ===============================
         メイン領域
    =============================== -->
    <main class="main">

      <!-- ドロップゾーン（管理者のみ） -->
      <div id="dropzone" class="dropzone admin-only">
        ここに画像をドラッグ＆ドロップ
      </div>

      <!-- ====== VIEW: ギャラリー ====== -->
      <div id="view-gallery" class="view">
        <div id="works-list" class="works-grid"></div>
      </div>

      <!-- ====== VIEW: ABOUT ====== -->
      <div id="view-about" class="view hidden">
        <div class="section-header">
          <h2>ABOUT</h2>
          <button id="edit-about" class="edit-button admin-only">編集</button>
        </div>
        <div id="about-content" class="editable-block"></div>
      </div>

      <!-- ====== VIEW: 制作について ====== -->
      <div id="view-info" class="view hidden">
        <div class="section-header">
          <h2>制作について</h2>
          <button id="edit-info" class="edit-button admin-only">編集</button>
        </div>
        <div id="info-content" class="editable-block"></div>
      </div>

    </main>
  </div>

  <!-- ===============================
       暗転レイヤー（Google画像検索風）
  =============================== -->
  <div id="overlay" class="overlay"></div>

  <!-- ===============================
       画像ビューア（左3/5 + 右2/5）
  =============================== -->
  <div id="image-viewer" class="image-viewer">

    <!-- 左側：大きい画像 -->
    <div class="viewer-left">
      <img id="viewer-image" class="viewer-image" src="" alt="" />
    </div>

    <!-- 右側：詳細パネル -->
    <div class="viewer-right">
      <button class="viewer-close">×</button>

      <h3 id="viewer-title" class="viewer-title"></h3>
      <div id="viewer-tags" class="viewer-tags"></div>
      <p id="viewer-description" class="viewer-description"></p>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
